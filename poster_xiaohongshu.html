<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    background: #f5f5f5;
}
.poster {
    width: 900px;
    height: 1200px;
    background: linear-gradient(135deg, #ffeef8 0%, #fff0f5 50%, #ffe4e1 100%);
    border-radius: 30px;
    padding: 60px;
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.heart {
    position: absolute;
    font-size: 30px;
    opacity: 0.3;
}
.mascot-area {
    text-align: center;
    margin-bottom: 30px;
}
.mascot-placeholder {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    box-shadow: 0 10px 30px rgba(255,107,157,0.3);
}
.title {
    font-size: 72px;
    font-weight: bold;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    margin-bottom: 10px;
}
.subtitle {
    font-size: 32px;
    color: #888;
    text-align: center;
    margin-bottom: 40px;
}
.features {
    background: rgba(255,255,255,0.8);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
}
.feature-item {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    font-size: 28px;
    color: #333;
}
.feature-icon {
    font-size: 40px;
    margin-right: 15px;
}
.cta {
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    color: white;
    padding: 25px 40px;
    border-radius: 50px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(255,107,157,0.4);
}
.url {
    text-align: center;
    font-size: 24px;
    color: #666;
    margin-bottom: 30px;
}
.tags {
    text-align: center;
    font-size: 22px;
    color: #999;
}
</style>
</head>
<body>
<div class="poster">
    <span class="heart" style="top: 50px; left: 50px;">💕</span>
    <span class="heart" style="top: 80px; right: 80px;">💖</span>
    <span class="heart" style="bottom: 100px; left: 80px;">✨</span>
    <span class="heart" style="bottom: 150px; right: 50px;">🌸</span>
    
    <div class="mascot-area">
        <div class="mascot-placeholder">👗</div>
    </div>
    
    <div class="title">StyleBuddy</div>
    <div class="subtitle">你的 AI 穿搭闺蜜</div>
    
    <div class="features">
        <div class="feature-item">
            <span class="feature-icon">📸</span>
            <span>智能衣橱管理 - 拍照录入自动分类</span>
        </div>
        <div class="feature-item">
            <span class="feature-icon">👗</span>
            <span>每日穿搭推荐 - 天气+场合3套方案</span>
        </div>
        <div class="feature-item">
            <span class="feature-icon">🛍️</span>
            <span>逛街种草咨询 - 避免冲动消费</span>
        </div>
        <div class="feature-item">
            <span class="feature-icon">🔒</span>
            <span>完全免费 · 本地存储 · 隐私安全</span>
        </div>
    </div>
    
    <div class="cta">🚀 clawhub install stylebuddy</div>
    
    <div class="url">🌐 89kpjddmtb-ui.github.io/stylebuddy-landing/</div>
    
    <div class="tags">#AI穿搭 #穿搭助手 #效率神器 #女生必备 #OpenClaw</div>
</div>
</body>
</html>
